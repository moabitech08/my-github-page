<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Unity Health Hospital</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="appointments.html">Appointments</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<main class="container my-5">
    <h2>BOOK AN APPOINTMENT</h2>

    <form action="#" method="POST">

        <div class="mb-3">
            <label for="firstname" class="form-label">First Name:</label>
            <input type="text" id="firstname" name="firstname" 
                   class="form-control w-25" required>
        </div>

        <div class="mb-3">
            <label for="lastname" class="form-label">Last Name:</label>
            <input type="text" id="lastname" name="lastname" 
                   class="form-control w-25" required>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email:</label>
            <input type="email" id="email" name="email" 
                   class="form-control w-25" required>
        </div>

        <div class="mb-3">
            <label for="tel" class="form-label">Phone Number:</label>
            <input type="tel" id="tel" name="phone" 
                   class="form-control w-25" required>
        </div>

        <div class="mb-3">
            <label for="speciality" class="form-label">Doctor Speciality:</label>
            <select id="speciality" name="speciality" 
                    class="form-select w-25" required>
                <option value="" disabled selected>Select doctor speciality</option>
                <option>Family Physician</option>
                <option>Physiotherapist</option>
                <option>Pathologist</option>
                <option>Dermatologist</option>
                <option>Gynaecologist</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="doctorname" class="form-label">Name of Doctor:</label>
            <select id="doctorname" name="doctorname" 
                    class="form-select w-25" required>
                <option value="" disabled selected>Select a doctor</option>
                <option>Dr. Teto Ryan</option>
                <option>Dr. Moabi Warona</option>
                <option>Dr. Dua Dua</option>
                <option>Dr. Louis Louis</option>
                <option>Dr. Katty Warren</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="datetime" class="form-label">Appointment Date & Time:</label>
            <input type="datetime-local" id="datetime" 
                   name="appointment_datetime" 
                   class="form-control w-25" required>
        </div>

        <button type="submit" class="btn btn-primary">
            Book Appointment
        </button>

    </form>
</main>

<footer class="text-center py-3">
    <p>&copy; Unity Health Hospital</p>
</footer>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
